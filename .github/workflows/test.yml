name: Test

on:
  push:
  pull_request:
    types: opened

jobs:
  check-source-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: |
          make install
          pre-commit run --all-files
