name: Main

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  check-source-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: "run pre-commit"
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: |
          make install
          pre-commit run --all-files
      - name: "commit check"
        uses: commit-check/commit-check-action@v1
        with:
          message: true
          job-summary: true
